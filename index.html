<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0f0f1a;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #c8c8d8;
    }
    #viewport {
        display: block;
        width: 100%;
        height: 100%;
    }
    #debug-overlay {
        position: absolute;
        top: 8px;
        left: 8px;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 12px;
        white-space: pre;
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 10px;
        border-radius: 4px;
        pointer-events: none;
        line-height: 1.4;
    }

    /* ── UI Panel ─────────────────────────────────────── */
    #ui-panel {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 220px;
        min-width: 160px;
        min-height: 100px;
        background: rgba(18, 18, 32, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        user-select: none;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        z-index: 10;
    }

    /* ── Header / Drag Handle ─────────────────────────── */
    #ui-panel .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        cursor: grab;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    #ui-panel .header:active { cursor: grabbing; }
    #ui-panel .header .title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.3);
    }
    #ui-panel .header .dot-group {
        display: flex;
        gap: 5px;
    }
    #ui-panel .header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        opacity: 0.4;
    }
    .dot-r { background: #ff5f56; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #27c93f; }

    /* ── Sections ──────────────────────────────────────── */
    #ui-panel section {
        padding: 10px 12px;
    }
    #ui-panel section + section {
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    #ui-panel h3 {
        margin: 0 0 8px 0;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: rgba(255, 255, 255, 0.25);
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3px 0;
    }
    .info-row .label {
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
    }
    .info-row .value {
        color: #d0d0e8;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.04);
        padding: 1px 6px;
        border-radius: 3px;
    }

    /* ── Gizmo Buttons (icon-only) ─────────────────────── */
    .gizmo-row {
        display: flex;
        gap: 5px;
    }
    .gizmo-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        color: rgba(255, 255, 255, 0.3);
    }
    .gizmo-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .gizmo-btn:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.6);
    }
    .gizmo-btn.active {
        background: rgba(100, 140, 255, 0.15);
        border-color: rgba(100, 140, 255, 0.4);
        color: #8ab4ff;
        box-shadow: 0 0 12px rgba(100, 140, 255, 0.08);
    }

    /* ── Resize Handle ─────────────────────────────────── */
    #resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        opacity: 0.3;
        transition: opacity 0.15s;
    }
    #ui-panel:hover #resize-handle { opacity: 0.6; }
    #resize-handle::after {
        content: '';
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 8px;
        height: 8px;
        border-right: 2px solid rgba(255, 255, 255, 0.5);
        border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 0 0 3px 0;
    }

    /* ── 3D Orientation Gizmo (existing) ───────────────── */
    #gizmo-container {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 80px;
        height: 80px;
        perspective: 400px;
        pointer-events: none;
    }
    #gizmo-space {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.05s linear;
    }
    .axis {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 35px;
        height: 3px;
        border-radius: 2px;
        transform-origin: left center;
    }
    .x-axis { background: #ff4444; transform: translate(0, -50%) rotateY(0deg); }
    .y-axis { background: #44ff44; transform: translate(0, -50%) rotateZ(-90deg); }
    .z-axis { background: #4444ff; transform: translate(0, -50%) rotateY(90deg); }
  </style>
  <title>Taka Editor</title>
</head>
<body>
  <canvas id="viewport"></canvas>
  <div id="debug-overlay"></div>

  <!-- ── UI Panel ──────────────────────────────────────── -->
  <div id="ui-panel">
    <div class="header" id="panel-header">
      <span class="title">Inspector</span>
      <span class="dot-group">
        <span class="dot dot-r"></span>
        <span class="dot dot-y"></span>
        <span class="dot dot-g"></span>
      </span>
    </div>

    <section id="section-selection">
      <h3>Selection</h3>
      <div class="info-row">
        <span class="label">Name</span>
        <span class="value" id="sel-name">—</span>
      </div>
      <div class="info-row">
        <span class="label">Position</span>
        <span class="value" id="sel-pos">—</span>
      </div>
      <div class="info-row">
        <span class="label">Size</span>
        <span class="value" id="sel-size">—</span>
      </div>
    </section>

    <section id="section-gizmo">
      <h3>Transform</h3>
      <div class="gizmo-row">
        <div class="gizmo-btn" id="gizmo-translate" title="Translate (1)">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/><circle cx="12" cy="12" r="2.5"/></svg>
        </div>
        <div class="gizmo-btn" id="gizmo-rotate" title="Rotate (2)">
          <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-3 17.3"/><path d="M12 3v4h4"/></svg>
        </div>
        <div class="gizmo-btn" id="gizmo-scale" title="Scale (3)">
          <svg viewBox="0 0 24 24"><path d="M18 6 6 18M14 6h4v4M6 14h4v4"/></svg>
        </div>
      </div>
    </section>

    <div id="resize-handle"></div>
  </div>

  <!-- 3D Orientation Gizmo (existing) -->
  <div id="gizmo-container">
    <div id="gizmo-space">
      <div class="axis x-axis"></div>
      <div class="axis y-axis"></div>
      <div class="axis z-axis"></div>
    </div>
  </div>

  <script>
    // ── Drag to move ──────────────────────────────────
    (function() {
      const panel = document.getElementById('ui-panel');
      const header = document.getElementById('panel-header');
      let ox, oy, dragging = false;

      header.addEventListener('mousedown', function(e) {
        dragging = true;
        ox = e.clientX - panel.offsetLeft;
        oy = e.clientY - panel.offsetTop;
        panel.style.transition = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        panel.style.left = (e.clientX - ox) + 'px';
        panel.style.top = (e.clientY - oy) + 'px';
        panel.style.right = 'auto';
        panel.style.bottom = 'auto';
      });

      document.addEventListener('mouseup', function() {
        dragging = false;
      });
    })();

    // ── Resize ──────────────────────────────────────────
    (function() {
      const panel = document.getElementById('ui-panel');
      const handle = document.getElementById('resize-handle');
      let dragging = false, sw, sh, sx, sy;

      handle.addEventListener('mousedown', function(e) {
        dragging = true;
        sw = panel.offsetWidth;
        sh = panel.offsetHeight;
        sx = e.clientX;
        sy = e.clientY;
        e.stopPropagation();
        panel.style.transition = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        const w = Math.max(160, sw + (e.clientX - sx));
        const h = Math.max(100, sh + (e.clientY - sy));
        panel.style.width = w + 'px';
        panel.style.height = h + 'px';
      });

      document.addEventListener('mouseup', function() {
        dragging = false;
      });
    })();
  </script>
</body>
</html>
