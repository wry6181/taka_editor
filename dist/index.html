<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0f0f1a;
        font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #c8c8d8;
    }
    #viewport {
        display: block;
        width: 100%;
        height: 100%;
    }
    #debug-overlay {
        position: absolute;
        top: 8px;
        left: 8px;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 12px;
        white-space: pre;
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 10px;
        border-radius: 4px;
        pointer-events: none;
        line-height: 1.4;
    }

    /* ── UI Panel ─────────────────────────────────────── */
    #ui-panel {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 220px;
        min-width: 160px;
        min-height: 100px;
        background: rgba(18, 18, 32, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 10px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        user-select: none;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        z-index: 10;
    }

    /* ── Header / Drag Handle ─────────────────────────── */
    #ui-panel .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        cursor: grab;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    #ui-panel .header:active { cursor: grabbing; }
    #ui-panel .header .title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.3);
    }
    #ui-panel .header .dot-group {
        display: flex;
        gap: 5px;
    }
    #ui-panel .header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        opacity: 0.4;
    }
    .dot-r { background: #ff5f56; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #27c93f; }

    /* ── Sections ──────────────────────────────────────── */
    #ui-panel section {
        padding: 10px 12px;
    }
    #ui-panel section + section {
        border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    #ui-panel h3 {
        margin: 0 0 8px 0;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: rgba(255, 255, 255, 0.25);
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 3px 0;
    }
    .info-row .label {
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
    }
    .info-row .value {
        color: #d0d0e8;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 11px;
        background: rgba(255, 255, 255, 0.04);
        padding: 1px 6px;
        border-radius: 3px;
    }

    /* ── Gizmo Buttons (icon-only) ─────────────────────── */
    .gizmo-row {
        display: flex;
        gap: 5px;
    }
    .gizmo-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
        color: rgba(255, 255, 255, 0.3);
    }
    .gizmo-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .gizmo-btn:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.6);
    }
    .gizmo-btn.active {
        background: rgba(100, 140, 255, 0.15);
        border-color: rgba(100, 140, 255, 0.4);
        color: #8ab4ff;
        box-shadow: 0 0 12px rgba(100, 140, 255, 0.08);
    }

    /* ── Resize Handle ─────────────────────────────────── */
    #resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        opacity: 0.3;
        transition: opacity 0.15s;
    }
    #ui-panel:hover #resize-handle { opacity: 0.6; }
    #resize-handle::after {
        content: '';
        position: absolute;
        right: 3px;
        bottom: 3px;
        width: 8px;
        height: 8px;
        border-right: 2px solid rgba(255, 255, 255, 0.5);
        border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 0 0 3px 0;
    }

    /* ── 3D Orientation Gizmo (existing) ───────────────── */
    #gizmo-container {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 80px;
        height: 80px;
        perspective: 400px;
        pointer-events: none;
    }
    #gizmo-space {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.05s linear;
    }
    .axis {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 35px;
        height: 3px;
        border-radius: 2px;
        transform-origin: left center;
    }
    .x-axis { background: #ff4444; transform: translate(0, -50%) rotateY(0deg); }
    .y-axis { background: #44ff44; transform: translate(0, -50%) rotateZ(-90deg); }
    .z-axis { background: #4444ff; transform: translate(0, -50%) rotateY(90deg); }

  <script>
    // ── Drag to move ──────────────────────────────────
    (function() {
      const panel = document.getElementById('ui-panel');
      const header = document.getElementById('panel-header');
      let ox, oy, dragging = false;

      header.addEventListener('mousedown', function(e) {
        dragging = true;
        ox = e.clientX - panel.offsetLeft;
        oy = e.clientY - panel.offsetTop;
        panel.style.transition = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        panel.style.left = (e.clientX - ox) + 'px';
        panel.style.top = (e.clientY - oy) + 'px';
        panel.style.right = 'auto';
        panel.style.bottom = 'auto';
      });

      document.addEventListener('mouseup', function() {
        dragging = false;
      });
    })();

    // ── Resize ──────────────────────────────────────────
    (function() {
      const panel = document.getElementById('ui-panel');
      const handle = document.getElementById('resize-handle');
      let dragging = false, sw, sh, sx, sy;

      handle.addEventListener('mousedown', function(e) {
        dragging = true;
        sw = panel.offsetWidth;
        sh = panel.offsetHeight;
        sx = e.clientX;
        sy = e.clientY;
        e.stopPropagation();
        panel.style.transition = 'none';
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        const w = Math.max(160, sw + (e.clientX - sx));
        const h = Math.max(100, sh + (e.clientY - sy));
        panel.style.width = w + 'px';
        panel.style.height = h + 'px';
      });

      document.addEventListener('mouseup', function() {
        dragging = false;
      });
    })();
  </script>

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();
