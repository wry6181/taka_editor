<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0f0f1a;
    }
    #viewport {
        display: block;
        width: 100%;
        height: 100%;
    }
    #debug-overlay {
        position: absolute;
        top: 8px;
        left: 8px;
        color: #e0e0e0;
        font-family: monospace;
        font-size: 12px;
        white-space: pre;
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 10px;
        border-radius: 4px;
        pointer-events: none; /* clicks pass through to the canvas */
        line-height: 1.4;
    }

    /* --- 3D Orientation Gizmo Styles --- */
    #gizmo-container {
        position: absolute;
        bottom: 24px;
        right: 24px;
        width: 80px;
        height: 80px;
        /* Perspective gives it a subtle 3D depth effect */
        perspective: 400px;
        pointer-events: none;
    }
    #gizmo-space {
        width: 100%;
        height: 100%;
        position: relative;
        /* Tells the browser to render children in true 3D space, not flattened */
        transform-style: preserve-3d;
        transition: transform 0.05s linear; /* Smooths out any micro-stutter */
    }
    .axis {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 35px;
        height: 3px;
        border-radius: 2px;
        /* Ensure the lines rotate around the exact center of our widget container */
        transform-origin: left center;
    }
    /* X-Axis points right by default (Red) */
    .x-axis {
        background: #ff4444;
        transform: translate(0, -50%) rotateY(0deg);
    }
    /* Y-Axis points straight up by default (Green) */
    .y-axis {
        background: #44ff44;
        transform: translate(0, -50%) rotateZ(-90deg);
    }
    /* Z-Axis points forward/backward out of the screen by default (Blue) */
    .z-axis {
        background: #4444ff;
        transform: translate(0, -50%) rotateY(90deg);
    }
  </style>
  <title>Canvas Test</title>
